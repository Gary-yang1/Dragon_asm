            application/json: { schema: { type: string, format: binary } }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    ProjectIDQuery:
      name: project_id
      in: query
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    ID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    UserID:
      name: user_id
      in: path
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    PageNumber:
      name: page_number
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
  responses:
    Unauthorized:
      description: Authentication failed or missing.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: The principal cannot access the requested tenant or project scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: State conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    GenericEnvelope:
      type: object
      required: [request_id, data]
      properties:
        request_id: { type: string }
        data: {}
    ErrorEnvelope:
      type: object
      required: [request_id, error]
      properties:
        request_id: { type: string }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, maxLength: 128 }
        password: { type: string, maxLength: 256 }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, maxLength: 4096 }
    TokenEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                access_token: { type: string }
                refresh_token: { type: string }
    LoginEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [access_token, refresh_token, user]
              properties:
                access_token: { type: string }
                refresh_token: { type: string }
                user:
                  type: object
                  required: [id, username, display_name, role, project_id, permissions, must_change_password]
                  properties:
                    id: { type: string }
                    name: { type: string }
                    username: { type: string }
                    display_name: { type: string }
                    role: { type: string }
                    project_id: { type: integer, format: uint64, minimum: 0 }
                    permissions: { type: array, uniqueItems: true, items: { type: string } }
                    must_change_password: { type: boolean }
    UserEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                id: { type: string }
                username: { type: string }
                display_name: { type: string }
                tenant_id: { type: string }
                org_id: { type: string }
                must_change_password: { type: boolean }
    PasswordChangeRequest:
      type: object
      required: [current_password, new_password]
      additionalProperties: false
      properties:
        current_password: { type: string, format: password, maxLength: 72, writeOnly: true }
        new_password: { type: string, format: password, minLength: 12, maxLength: 72, writeOnly: true }
    PasswordChangeEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [must_change_password]
              properties:
                must_change_password: { type: boolean, enum: [false] }
    TenantRole:
      type: string
      nullable: true
      enum: [system_admin, security_admin]
    PlatformUser:
      type: object
      required: [id, username, name, email, phone, department, role, project_count, status, must_change_password, created_at, updated_at]
      properties:
        id: { type: integer, format: uint64 }
        username: { type: string, maxLength: 128, pattern: "^[a-z0-9][a-z0-9._-]{0,127}$" }
        name: { type: string, maxLength: 255 }
        email: { type: string, format: email, maxLength: 255 }
        phone: { type: string, maxLength: 32 }
        department: { type: string, maxLength: 128 }
        role: { $ref: "#/components/schemas/TenantRole" }
        project_count: { type: integer, format: int64, minimum: 0 }
        status: { type: string, enum: [active, disabled] }
        last_login_at: { type: string, format: date-time, nullable: true }
        must_change_password: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PlatformUserEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/PlatformUser" }
    PlatformUserPageEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [items, total, page_size, page_number]
              properties:
                items: { type: array, items: { $ref: "#/components/schemas/PlatformUser" } }
                total: { type: integer, format: int64, minimum: 0 }
                page_size: { type: integer, minimum: 1, maximum: 100 }
                page_number: { type: integer, minimum: 1 }
    PlatformUserCreateRequest:
      type: object
      required: [username, name, password]
      properties:
        username: { type: string, maxLength: 128, pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$" }
        name: { type: string, minLength: 1, maxLength: 255 }
        email: { type: string, format: email, maxLength: 255 }
        phone: { type: string, maxLength: 32 }
        department: { type: string, maxLength: 128 }
        role: { $ref: "#/components/schemas/TenantRole" }
        status: { type: string, enum: [active, disabled], default: active }
        password: { type: string, format: password, minLength: 12, maxLength: 72, writeOnly: true }
    PlatformUserUpdateRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        email: { type: string, format: email, maxLength: 255 }
        phone: { type: string, maxLength: 32 }
        department: { type: string, maxLength: 128 }
    PlatformUserTransitionRequest:
      type: object
      required: [status, reason]
      additionalProperties: false
      properties:
        status: { type: string, enum: [active, disabled] }
        reason: { type: string, minLength: 1, maxLength: 512 }
    PlatformUserPasswordResetRequest:
      type: object
      required: [temporary_password]
      additionalProperties: false
      properties:
        temporary_password: { type: string, format: password, minLength: 12, maxLength: 72, writeOnly: true }
    TenantRoleUpdateRequest:
      type: object
      required: [role]
      additionalProperties: false
      properties:
        role: { $ref: "#/components/schemas/TenantRole" }
    PlatformUserProject:
      type: object
      required: [id, project_code, name, role, status, updated_at]
      properties:
        id: { type: integer, format: uint64 }
        project_code: { type: string }
        name: { type: string }
        role: { type: string, enum: [project_owner, security_ops, developer, viewer] }
        status: { type: string }
        updated_at: { type: string, format: date-time }
    PlatformUserProjectsEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [items]
              properties:
                items: { type: array, items: { $ref: "#/components/schemas/PlatformUserProject" } }
    AdminRole:
      type: object
      required: [value, label, scope, permissions]
      properties:
        value: { type: string, enum: [system_admin, security_admin, project_owner, security_ops, developer, viewer] }
        label: { type: string }
        scope: { type: string, enum: [tenant, project] }
        permissions: { type: array, uniqueItems: true, items: { type: string } }
    AdminRolesEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data: { type: array, items: { $ref: "#/components/schemas/AdminRole" } }
    DuplicateEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                duplicate: { type: boolean }
    Project:
      type: object
      required: [id, project_code, name, owner_user_id, criticality, status]
      properties:
        id: { type: integer, format: uint64 }
        project_code: { type: string, maxLength: 64 }
        name: { type: string, maxLength: 255 }
        owner_user_id: { type: string, maxLength: 64 }
        business_unit: { type: string, maxLength: 128 }
        criticality: { type: string, enum: [low, medium, high, critical] }
        status: { type: string, enum: [draft, active, suspended, archived] }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProjectEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/Project" }
    ProjectPageEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                items: { type: array, items: { $ref: "#/components/schemas/Project" } }
                total: { type: integer }
                page_size: { type: integer }
                page_number: { type: integer }
    WorkspaceProject:
      type: object
      required: [id, project_code, name, owner_user_id, business_unit, criticality, status, updated_at]
      properties:
        id: { type: integer, format: uint64 }
        project_code: { type: string, maxLength: 64 }
        name: { type: string, maxLength: 255 }
        owner_user_id: { type: string, maxLength: 64 }
        business_unit: { type: string, maxLength: 128 }
        criticality: { type: string, enum: [low, medium, high, critical] }
        status: { type: string, enum: [draft, active, suspended, archived] }
        updated_at: { type: string, format: date-time }
    WorkspaceSummaryEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [projects, assets, risks, tickets, recent_projects]
              properties:
                projects:
                  type: object
                  required: [total, active, draft, suspended]
                  properties:
                    total: { type: integer, format: int64, minimum: 0 }
                    active: { type: integer, format: int64, minimum: 0 }
                    draft: { type: integer, format: int64, minimum: 0 }
                    suspended: { type: integer, format: int64, minimum: 0 }
                assets:
                  type: object
                  required: [total]
                  properties:
                    total: { type: integer, format: int64, minimum: 0 }
                risks:
                  type: object
                  required: [open, critical_high, overdue]
                  properties:
                    open: { type: integer, format: int64, minimum: 0 }
                    critical_high: { type: integer, format: int64, minimum: 0 }
                    overdue: { type: integer, format: int64, minimum: 0 }
                tickets:
                  type: object
                  required: [open, overdue]
                  properties:
                    open: { type: integer, format: int64, minimum: 0 }
                    overdue: { type: integer, format: int64, minimum: 0 }
                recent_projects:
                  type: array
                  items: { $ref: "#/components/schemas/WorkspaceProject" }
    ProjectCapabilitiesEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [role, permissions, can_activate, onboarding_missing]
              properties:
                role: { type: string }
                permissions:
                  type: array
                  uniqueItems: true
                  items: { type: string }
                can_activate: { type: boolean }
                onboarding_missing:
                  type: array
                  items: { type: string }
    ProjectCreateRequest:
      type: object
      required: [project_code, name]
      properties:
        project_code: { type: string, pattern: "^[a-z0-9][a-z0-9_-]{0,63}$" }
        name: { type: string, maxLength: 255 }
        owner_user_id: { type: string, maxLength: 64 }
        business_unit: { type: string, maxLength: 128 }
        criticality: { type: string, enum: [low, medium, high, critical], default: medium }
        description: { type: string, maxLength: 65535 }
    ProjectUpdateRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        owner_user_id: { type: string, maxLength: 64 }
        business_unit: { type: string, maxLength: 128 }
        criticality: { type: string, enum: [low, medium, high, critical] }
        description: { type: string, maxLength: 65535 }
    ProjectSubjectRequest:
      type: object
      required: [subject_name]
      properties:
        subject_name: { type: string, maxLength: 255 }
        subject_type: { type: string, enum: [company, government, institution, individual, other] }
        registration_code: { type: string, maxLength: 64 }
        country_code: { type: string, minLength: 2, maxLength: 2 }
        region: { type: string, maxLength: 128 }
        is_primary: { type: boolean }
        verification_status: { type: string, enum: [unverified, verified, mismatch] }
        source: { type: string, maxLength: 64 }
        verified_at: { type: string, format: date-time, nullable: true }
        evidence_summary: { type: string, maxLength: 1024 }
    ProjectDomainRequest:
      type: object
      required: [domain]
      properties:
        domain: { type: string, maxLength: 253 }
        subject_id: { type: integer, format: uint64 }
        is_primary: { type: boolean }
        ownership_status: { type: string, enum: [unverified, verified, mismatch] }
        source: { type: string, maxLength: 64 }
        evidence_summary: { type: string, maxLength: 1024 }
    ProjectDomainUpdateRequest:
      type: object
      properties:
        subject_id: { type: integer, format: uint64 }
        is_primary: { type: boolean }
        ownership_status: { type: string, enum: [unverified, verified, mismatch] }
        source: { type: string, maxLength: 64 }
        evidence_summary: { type: string, maxLength: 1024 }
    ICPRequest:
      type: object
      required: [subject_id, filing_no]
      properties:
        subject_id: { type: integer, format: uint64 }
        filing_no: { type: string, maxLength: 128 }
        filing_type: { type: string, enum: [filing, license] }
        website_name: { type: string, maxLength: 255 }
        status: { type: string, enum: [unverified, valid, invalid, cancelled] }
        approved_at: { type: string, format: date-time, nullable: true }
        source: { type: string, maxLength: 64 }
        verified_at: { type: string, format: date-time, nullable: true }
        evidence_summary: { type: string, maxLength: 1024 }
        domain_profile_ids:
          type: array
          maxItems: 100
          items: { type: integer, format: uint64 }
    Asset:
      type: object
      properties:
        id: { type: integer, format: uint64 }
        project_id: { type: integer, format: uint64 }
        asset_type: { type: string }
        asset_key: { type: string }
        display_name: { type: string }
        value: { type: string }
        source: { type: string }
        owner: { type: string }
        business_unit: { type: string }
        confidence: { type: integer, minimum: 0, maximum: 100 }
        miss_count: { type: integer, minimum: 0 }
        status: { type: string }
        first_seen: { type: string, format: date-time }
        last_seen: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        created_by: { type: string }
        updated_by: { type: string }
    AssetEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Asset"
    AssetPageEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/Asset"
                total: { type: integer }
                page_size: { type: integer }
                page_number: { type: integer }
    AssetImportRequest:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items:
            type: object
            required: [asset_type, value]
            properties:
              asset_type: { type: string }
              value: { type: string }
              display_name: { type: string }
              source: { type: string }
              owner: { type: string }
              business_unit: { type: string }
              confidence: { type: integer, minimum: 0, maximum: 100 }
              status: { type: string }
    AssetUpdateRequest:
      type: object
      properties:
        display_name: { type: string }
        source: { type: string }
        owner: { type: string }
        business_unit: { type: string }
        status: { type: string }
