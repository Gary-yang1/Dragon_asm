    post:
      tags: [discovery]
      summary: Cancel one dispatched TaskRun.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/RunID"
      responses:
        "200": { description: Cancelled TaskRun., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /discovery/callback:
    post:
      tags: [discovery]
      security: []
      summary: External engine callback endpoint protected by HMAC headers.
      parameters:
        - $ref: "#/components/parameters/ProjectIDQuery"
        - name: run_id
          in: query
          required: true
          schema: { type: integer, format: uint64, minimum: 1 }
        - name: seq
          in: query
          required: true
          schema: { type: integer, format: uint64, minimum: 1 }
        - name: X-Signature
          in: header
          required: true
          schema: { type: string }
        - name: X-Engine-ID
          in: header
          required: true
          description: Stable engine identity bound to task_run.callback_secret_ref.
          schema: { type: string, minLength: 1, maxLength: 64, pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,63}$" }
        - name: X-Timestamp
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        x-max-body-bytes: 4194304
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DiscoveryCallbackBatchV1" }
      responses:
        "200":
          description: Callback accepted or detected as duplicate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          description: Callback body exceeds 4 MiB.
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
        "422":
          $ref: "#/components/responses/Unprocessable"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
