openapi: 3.0.3
info:
  title: ASM Platform API
  version: 0.9.0
  description: |
    Contract for the HTTP routes currently mounted by cmd/api, including
    project-scoped Discovery scope, task template, TaskRun, and engine callback
    management.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: auth
  - name: platform-users
  - name: workspace
  - name: projects
  - name: assets
  - name: discovery
  - name: exposures
  - name: risks
  - name: tickets
  - name: notifications
  - name: reports
paths:
  /auth/login:
    post:
      tags: [auth]
      security: []
      summary: Login and return an access/refresh token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Token pair and initial user session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginEnvelope"
        "400":
          description: Malformed login request.
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/refresh:
    post:
      tags: [auth]
      security: []
      summary: Refresh an access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/me:
    get:
      tags: [auth]
      summary: Return the current user profile.
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/permissions:
    get:
      tags: [auth]
      summary: Return permissions for the current principal.
      responses:
        "200":
          description: Permission list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/password/change:
    post:
      tags: [auth]
      summary: Change the authenticated user's password.
      description: Verifies the current password, clears must_change_password, increments auth_version, revokes existing access/refresh tokens, and writes an audit event atomically.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordChangeRequest" }
      responses:
        "200":
          description: Password changed; the caller must authenticate again.
          content: { application/json: { schema: { $ref: "#/components/schemas/PasswordChangeEnvelope" } } }
        "400": { description: Malformed request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { description: Invalid current password, unchanged password, or password-policy failure., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
  /admin/users:
    get:
      tags: [platform-users]
      summary: List users in the current actor's tenant.
      description: Requires user:read. The tenant is always resolved from the authenticated actor.
      parameters:
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - name: q
          in: query
          schema: { type: string, maxLength: 128 }
        - name: status
          in: query
          schema: { type: string, enum: [active, disabled] }
        - name: role
          in: query
          schema: { type: string, enum: [system_admin, security_admin, none] }
      responses:
        "200": { description: Tenant-scoped user page., content: { application/json: { schema: { $ref: "#/components/schemas/PlatformUserPageEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [platform-users]
      summary: Create a user in the current actor's tenant and organization.
      description: Requires user:write. A non-null role additionally requires user:role:write. Usernames are normalized to lowercase ASCII and are immutable.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlatformUserCreateRequest" }
      responses:
        "201": { description: Created user., content: { application/json: { schema: { $ref: "#/components/schemas/PlatformUserEnvelope" } } } }
        "400": { description: Malformed request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { description: Invalid profile, role, or temporary password., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
  /admin/users/{user_id}:
    get:
      tags: [platform-users]
      summary: Get a user in the current actor's tenant.
      parameters: [{ $ref: "#/components/parameters/UserID" }]
      responses:
        "200": { description: Platform user., content: { application/json: { schema: { $ref: "#/components/schemas/PlatformUserEnvelope" } } } }
        "400": { description: Invalid user id., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Missing or cross-tenant users both return not found., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    patch:
      tags: [platform-users]
      summary: Update mutable platform-user profile fields.
      description: Username, status, password, and role are not mutable through this endpoint.
      parameters: [{ $ref: "#/components/parameters/UserID" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlatformUserUpdateRequest" }
      responses:
        "200": { description: Updated user., content: { application/json: { schema: { $ref: "#/components/schemas/PlatformUserEnvelope" } } } }
        "400": { description: Invalid user id or malformed request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Missing or cross-tenant user., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "422": { description: Invalid profile fields., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
  /admin/users/{user_id}/transitions:
    post:
      tags: [platform-users]
      summary: Enable or disable a platform user.
      description: Requires user:write. A reason is mandatory. Self-disable and removal of the last active system administrator are rejected. Successful transitions revoke existing sessions and are transactionally audited.
      parameters: [{ $ref: "#/components/parameters/UserID" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlatformUserTransitionRequest" }
      responses:
        "200": { description: Updated user., content: { application/json: { schema: { $ref: "#/components/schemas/PlatformUserEnvelope" } } } }
        "400": { description: Invalid user id or malformed request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Missing or cross-tenant user., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "422": { description: Invalid status or reason., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /admin/users/{user_id}/password-reset:
    post:
      tags: [platform-users]
      summary: Replace a user's password with an administrator-supplied temporary password.
      description: Requires user:credential:reset. The password is bcrypt-hashed, never returned or audited, and existing sessions are revoked.
      parameters: [{ $ref: "#/components/parameters/UserID" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlatformUserPasswordResetRequest" }
      responses:
        "200": { description: Password reset acknowledgement., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "400": { description: Invalid user id or malformed request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Missing or cross-tenant user., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "422": { description: Temporary password violates policy., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
  /admin/users/{user_id}/tenant-role:
    put:
      tags: [platform-users]
      summary: Set or clear a user's tenant-level platform role.
      description: Requires user:role:write. A null role clears the assignment. Role changes revoke existing sessions and are transactionally audited.
      parameters: [{ $ref: "#/components/parameters/UserID" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TenantRoleUpdateRequest" }
      responses:
        "200": { description: Role assignment acknowledgement., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "400": { description: Invalid user id or malformed request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Missing or cross-tenant user., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "422": { description: Invalid tenant role., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /admin/users/{user_id}/projects:
    get:
      tags: [platform-users]
      summary: List a user's project memberships without modifying them.
      parameters: [{ $ref: "#/components/parameters/UserID" }]
      responses:
        "200": { description: Project membership list., content: { application/json: { schema: { $ref: "#/components/schemas/PlatformUserProjectsEnvelope" } } } }
        "400": { description: Invalid user id., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Missing or cross-tenant user., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
  /admin/roles:
    get:
      tags: [platform-users]
      summary: Return the fixed read-only role matrix.
      description: Requires user:read. Only system administrators receive user-management permissions.
      responses:
        "200": { description: Fixed role matrix., content: { application/json: { schema: { $ref: "#/components/schemas/AdminRolesEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /workspace/summary:
    get:
      tags: [workspace]
      summary: Return an actor-scoped cross-project workspace summary.
      description: Ordinary members are aggregated only across their memberships. Explicit cross-project administrators are still restricted to their tenant and the read is audited.
      responses:
        "200":
          description: Workspace summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSummaryEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /projects:
    get:
      tags: [projects]
      summary: List projects visible to the current principal.
      parameters:
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200": { description: Paged projects, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectPageEnvelope" } } } }
    post:
      tags: [projects]
      summary: Create a draft project and initialize its owner membership.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectCreateRequest" }
      responses:
        "201": { description: Draft project, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectEnvelope" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /projects/{project_id}:
    get:
      tags: [projects]
      summary: Get a project profile.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      responses:
        "200": { description: Project, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectEnvelope" } } } }
    patch:
      tags: [projects]
      summary: Update editable project fields.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectUpdateRequest" }
      responses:
        "200": { description: Updated project, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectEnvelope" } } } }
  /projects/{project_id}/transitions:
    post:
      tags: [projects]
      summary: Transition project lifecycle state.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, suspended, archived] }
                reason: { type: string, maxLength: 512 }
      responses:
        "200": { description: Updated project, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectEnvelope" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { description: Project onboarding is incomplete, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
  /projects/{project_id}/onboarding-status:
    get:
      tags: [projects]
      summary: Return project activation readiness.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      responses:
        "200": { description: Readiness, content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
  /projects/{project_id}/capabilities:
    get:
      tags: [projects]
      summary: Return effective capabilities for the current actor in one project.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      responses:
        "200":
          description: Effective project role, permissions and activation readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCapabilitiesEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /projects/{project_id}/subjects:
    get:
      tags: [projects]
      summary: List project subjects.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      responses:
        "200": { description: Subjects, content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
    post:
      tags: [projects]
      summary: Create a project subject.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectSubjectRequest" } } } }
      responses:
        "201": { description: Subject, content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
  /projects/{project_id}/subjects/{id}:
    patch:
      tags: [projects]
      summary: Update a project subject.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }, { $ref: "#/components/parameters/ID" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectSubjectRequest" } } } }
      responses:
        "200": { description: Subject, content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
  /projects/{project_id}/domains:
    get:
      tags: [projects]
      summary: List registrable root-domain profiles.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      responses:
        "200": { description: Domains, content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
    post:
      tags: [projects]
      summary: Add a root-domain profile and idempotently materialize its domain asset.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectDomainRequest" } } } }
      responses:
        "201": { description: Domain profile, content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "422": { description: Invalid registrable domain, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
  /projects/{project_id}/domains/{id}:
    patch:
      tags: [projects]
      summary: Update root-domain profile metadata.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }, { $ref: "#/components/parameters/ID" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ProjectDomainUpdateRequest" } } } }
      responses:
        "200": { description: Domain profile, content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
  /projects/{project_id}/icp-filings:
    get:
      tags: [projects]
      summary: List ICP filing profiles.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      responses:
        "200": { description: ICP filings, content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
    post:
      tags: [projects]
      summary: Create an ICP filing and associate root-domain profiles.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ICPRequest" } } } }
      responses:
        "201": { description: ICP filing, content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
  /projects/{project_id}/icp-filings/{id}:
    patch:
      tags: [projects]
      summary: Update an ICP filing and replace domain associations.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }, { $ref: "#/components/parameters/ID" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ICPRequest" } } } }
      responses:
        "200": { description: ICP filing, content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
  /projects/{project_id}/scopes:
    get:
      tags: [discovery]
      summary: List project authorization scopes.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - name: sort_by
          in: query
          schema: { type: string, enum: [id, name, status, valid_until], default: id }
        - $ref: "#/components/parameters/SortOrder"
      responses:
        "200": { description: Paged scopes., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [discovery]
      summary: Create a project authorization scope.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ScopeCreateRequest" } } }
      responses:
        "201": { description: Created scope., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Unprocessable" }
  /projects/{project_id}/scopes/{scope_id}:
    get:
      tags: [discovery]
      summary: Get one project scope.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/ScopeID"
      responses:
        "200": { description: Scope detail., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [discovery]
      summary: Update one project scope.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/ScopeID"
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ScopeUpdateRequest" } } }
      responses:
        "200": { description: Updated scope., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
  /projects/{project_id}/scopes/{scope_id}/deactivate:
    post:
      tags: [discovery]
      summary: Deactivate one project scope.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/ScopeID"
      responses:
        "204": { description: Scope deactivated. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /projects/{project_id}/discovery/templates:
    get:
      tags: [discovery]
      summary: List discovery task templates.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/PageNumber"
        - $ref: "#/components/parameters/PageSize"
        - name: sort_by
          in: query
          schema: { type: string, enum: [id, name, task_type, enabled], default: id }
        - $ref: "#/components/parameters/SortOrder"
      responses:
        "200": { description: Paged task templates., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [discovery]
      summary: Create a discovery task template.
      parameters: [{ $ref: "#/components/parameters/ProjectID" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TaskTemplateCreateRequest" } } }
      responses:
        "201": { description: Created task template., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Unprocessable" }
  /projects/{project_id}/discovery/templates/{template_id}:
    get:
      tags: [discovery]
      summary: Get one discovery task template.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/TemplateID"
      responses:
        "200": { description: Task template detail., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [discovery]
      summary: Update one discovery task template.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/TemplateID"
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TaskTemplateUpdateRequest" } } }
      responses:
        "200": { description: Updated task template., content: { application/json: { schema: { $ref: "#/components/schemas/GenericEnvelope" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
    delete:
      tags: [discovery]
      summary: Soft-delete one discovery task template.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/TemplateID"
      responses:
