components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    ProjectIDQuery:
      name: project_id
      in: query
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    ID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    ScopeID:
      name: scope_id
      in: path
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    TemplateID:
      name: template_id
      in: path
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    RunID:
      name: run_id
      in: path
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    UserID:
      name: user_id
      in: path
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    PageNumber:
      name: page_number
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    SortOrder:
      name: sort_order
      in: query
      schema: { type: string, enum: [asc, desc], default: desc }
  responses:
    BadRequest:
      description: The request body or parameters are malformed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Authentication failed or missing.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: The principal cannot access the requested tenant or project scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: State conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: The requested project-scoped resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unprocessable:
      description: The request is well-formed but violates discovery validation rules.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ServiceUnavailable:
      description: Discovery queue, callback configuration, or engine is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    GenericEnvelope:
      type: object
      required: [request_id, data]
      properties:
        request_id: { type: string }
        data: {}
    ErrorEnvelope:
      type: object
      required: [request_id, error]
      properties:
        request_id: { type: string }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
    ScopeTargetRequest:
      type: object
      additionalProperties: false
      required: [target_type, match_mode, value]
      properties:
        target_type: { type: string, enum: [domain, ip, cidr, url] }
        match_mode: { type: string, enum: [include, exclude] }
        value: { type: string, minLength: 1, maxLength: 512 }
    ScopeCreateRequest:
      type: object
      additionalProperties: false
      required: [name, authorized_by, valid_from, valid_until, targets]
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        status: { type: string, enum: [active, inactive], default: inactive }
        authorized_by: { type: string, minLength: 1, maxLength: 64 }
        valid_from: { type: string, format: date-time }
        valid_until: { type: string, format: date-time }
        targets:
          type: array
          minItems: 1
          maxItems: 1000
          items: { $ref: "#/components/schemas/ScopeTargetRequest" }
    ScopeUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        status: { type: string, enum: [active, inactive] }
        authorized_by: { type: string, minLength: 1, maxLength: 64 }
        valid_from: { type: string, format: date-time }
        valid_until: { type: string, format: date-time }
        targets:
          type: array
          minItems: 1
          maxItems: 1000
          items: { $ref: "#/components/schemas/ScopeTargetRequest" }
    TaskTemplateCreateRequest:
      type: object
      additionalProperties: false
      required: [scope_id, name, task_type, config, timeout_seconds, rate_limit, concurrency, retry_limit]
      properties:
        scope_id: { type: integer, format: uint64, minimum: 1 }
        name: { type: string, minLength: 1, maxLength: 128 }
        task_type: { type: string, enum: [dns, ct_log, port_probe, web_probe, fingerprint, cloud_sync, passive_intel, import] }
        config: { type: object, additionalProperties: true, maxProperties: 64 }
        schedule: { type: string, maxLength: 255 }
        enabled: { type: boolean, default: false }
        timeout_seconds: { type: integer, minimum: 1, maximum: 86400 }
        rate_limit:
          type: integer
          minimum: 1
          maximum: 10000
          description: Per-job maximum outbound provider and DNS operations started per second.
        concurrency: { type: integer, minimum: 1, maximum: 500 }
        retry_limit: { type: integer, minimum: 0, maximum: 100 }
    TaskTemplateUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        task_type: { type: string, enum: [dns, ct_log, port_probe, web_probe, fingerprint, cloud_sync, passive_intel, import] }
        config: { type: object, additionalProperties: true, maxProperties: 64 }
        schedule: { type: string, maxLength: 255 }
        timeout_seconds: { type: integer, minimum: 1, maximum: 86400 }
        rate_limit:
          type: integer
          minimum: 1
          maximum: 10000
          description: Per-job maximum outbound provider and DNS operations started per second.
        concurrency: { type: integer, minimum: 1, maximum: 500 }
        retry_limit: { type: integer, minimum: 0, maximum: 100 }
    TaskTemplateEnabledRequest:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled: { type: boolean }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, maxLength: 128 }
        password: { type: string, maxLength: 256 }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, maxLength: 4096 }
    TokenEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                access_token: { type: string }
                refresh_token: { type: string }
    LoginEnvelope:
      allOf:
        - $ref: "#/components/schemas/GenericEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [access_token, refresh_token, user]
              properties:
                access_token: { type: string }
                refresh_token: { type: string }
                user:
                  type: object
