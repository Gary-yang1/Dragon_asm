services:
  mysql-e2e:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root-e2e-only
      MYSQL_DATABASE: asm_e2e
      MYSQL_USER: asm
      MYSQL_PASSWORD: changeme
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uasm", "-pchangeme"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/mysql

  redis-e2e:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 2s
      retries: 30
