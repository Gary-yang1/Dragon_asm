# ASM RBAC Model — two-dimensional (subject, domain, object, action)
#
# r.sub  = user ID or role name
# r.dom  = project_id (the data-scope domain; "*" = global / cross-project)
# r.obj  = permission point, e.g. "asset:read"
# r.act  = "allow" (all policies use "allow"; deny is implicit absence)
#
# Role inheritance is per-domain: a user may be project_owner in project 1
# and viewer in project 2; global roles use domain "*" and are evaluated first.

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
# g(user, role, domain) — role assignment is scoped per project
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# Effective rule: user has role in this domain (or global "*"), role has permission
m = (g(r.sub, p.sub, r.dom) || g(r.sub, p.sub, "*")) && (r.dom == p.dom || p.dom == "*") && r.obj == p.obj && r.act == p.act
