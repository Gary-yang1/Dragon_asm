# Development-only compose file.
# Secrets use ${VAR:-fallback} so that a real .env file overrides them.
# DO NOT use these fallback values outside local development.

services:
  api:
    build:
      context: .
      target: final
    command: ["/app/api"]
    ports:
      - "8080:8080"
    environment:
      GIN_MODE: ${GIN_MODE:-debug}
      API_PORT: ${API_PORT:-8080}
      APP_VERSION: ${APP_VERSION:-dev}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-asm}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-asm}
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-changeme}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-changeme}
      DISCOVERY_CALLBACK_SECRET: ${DISCOVERY_CALLBACK_SECRET:-dev-callback-secret-changeme}
      DISCOVERY_CALLBACK_SECRET_REF: ${DISCOVERY_CALLBACK_SECRET_REF:-baiyan-primary}
      DISCOVERY_CALLBACK_SECRETS: ${DISCOVERY_CALLBACK_SECRETS:-}
      DISCOVERY_CALLBACK_LEGACY_SECRET: ${DISCOVERY_CALLBACK_LEGACY_SECRET:-}
      DISCOVERY_CALLBACK_BASE_URL: ${DISCOVERY_CALLBACK_BASE_URL:-http://api:8080}
      DISCOVERY_ENGINE_BASE_URL: ${DISCOVERY_ENGINE_BASE_URL:-}
      DISCOVERY_ENGINE_TOKEN: ${DISCOVERY_ENGINE_TOKEN:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      target: final
    command: ["/app/worker"]
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-asm}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-asm}
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DISCOVERY_ENGINE_BASE_URL: ${DISCOVERY_ENGINE_BASE_URL:-}
      DISCOVERY_ENGINE_TOKEN: ${DISCOVERY_ENGINE_TOKEN:-}
      DISCOVERY_CALLBACK_BASE_URL: ${DISCOVERY_CALLBACK_BASE_URL:-http://api:8080}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  baiyan-engine:
    profiles: ["baiyan"]
    build:
      context: ./engines/baiyan
      dockerfile: Dockerfile.engine
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "${BAIYAN_ENGINE_PORT:-9090}:9090"
    environment:
      BAIYAN_LISTEN_ADDR: ":9090"
      BAIYAN_ENGINE_TOKEN: ${DISCOVERY_ENGINE_TOKEN:-}
      BAIYAN_ENGINE_ID: ${DISCOVERY_CALLBACK_SECRET_REF:-baiyan-primary}
      BAIYAN_CALLBACK_SECRET: ${DISCOVERY_CALLBACK_SECRET:-}
      BAIYAN_CALLBACK_ALLOWED_ORIGIN: ${BAIYAN_CALLBACK_ALLOWED_ORIGIN:-http://api:8080}
      BAIYAN_JOB_STORE_DIR: /var/lib/baiyan/jobs
      BAIYAN_QUEUE_SIZE: ${BAIYAN_QUEUE_SIZE:-100}
      BAIYAN_WORKERS: ${BAIYAN_WORKERS:-2}
      BAIYAN_PASSIVE_PROVIDER_NAME: ${BAIYAN_PASSIVE_PROVIDER_NAME:-certificate_transparency}
      BAIYAN_PASSIVE_PROVIDER_URL: ${BAIYAN_PASSIVE_PROVIDER_URL:-}
      BAIYAN_PASSIVE_PROVIDER_TOKEN: ${BAIYAN_PASSIVE_PROVIDER_TOKEN:-}
      BAIYAN_PASSIVE_MAX_RESULTS: ${BAIYAN_PASSIVE_MAX_RESULTS:-500}
      FOFA_EMAIL: ${FOFA_EMAIL:-}
      FOFA_KEY: ${FOFA_KEY:-}
      FOFA_MAX_RESULTS: ${FOFA_MAX_RESULTS:-1000}
      BAIYAN_DNS_PROVIDER_URL: ${BAIYAN_DNS_PROVIDER_URL:-}
      BAIYAN_DNS_PROVIDER_TOKEN: ${BAIYAN_DNS_PROVIDER_TOKEN:-}
      BAIYAN_DNS_MAX_RESULTS: ${BAIYAN_DNS_MAX_RESULTS:-500}
    volumes:
      - baiyan_jobs:/var/lib/baiyan/jobs
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-changeme}
      MYSQL_DATABASE: ${DB_NAME:-asm}
      MYSQL_USER: ${DB_USER:-asm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-asm}", "-p${DB_PASSWORD:-changeme}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  baiyan_jobs:
  redis_data:
