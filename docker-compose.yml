version: '3.9'

# Development-only compose file.
# Secrets use ${VAR:-fallback} so that a real .env file overrides them.
# DO NOT use these fallback values outside local development.

services:
  api:
    build:
      context: .
      target: final
    command: ["/app/api"]
    ports:
      - "8080:8080"
    environment:
      GIN_MODE: ${GIN_MODE:-debug}
      API_PORT: ${API_PORT:-8080}
      APP_VERSION: ${APP_VERSION:-dev}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-asm}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-asm}
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-changeme}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-changeme}
      ENGINE_CALLBACK_SECRET: ${ENGINE_CALLBACK_SECRET:-dev-callback-secret-changeme}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      target: final
    command: ["/app/worker"]
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-asm}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-asm}
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-changeme}
      MYSQL_DATABASE: ${DB_NAME:-asm}
      MYSQL_USER: ${DB_USER:-asm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-asm}", "-p${DB_PASSWORD:-changeme}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
